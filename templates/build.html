<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- load MUI -->
  <link href="//cdn.muicss.com/mui-0.10.0/css/mui.min.css" rel="stylesheet" type="text/css" />
  <script src="//cdn.muicss.com/mui-0.10.0/js/mui.min.js"></script>

  <style>
    .item1 {
      grid-row: 1 / span 2;
    }

    body {
      text-align: center;
    }

    img {
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .app-icon {
      border-radius: 30px;
    }

    a.install-button:link,
    a.install-button:visited {
      background-color: #3A95FE;
      color: white;
      padding: 5px 25px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      border-radius: 20px;
    }

    a.install-button:hover,
    a.install-button:active {
      background-color: #3A95FE;
    }
    
    .app-info-table {
      margin-bottom: 20px;
    }

    .app-title {
      font-size: 5vw;
    }

    .app-version {
      font-size: 3vw;
      margin-top: 10px;
      margin-bottom: 10px;
    }
  </style>

</head>

<body>
  <div class="mui-container">
    <button class="mui-btn mui-btn--accent" onclick="location.href='../../security/uiCA.crt'">Install
      Certificate</button>

    <div class="mui-panel">

      <div>
        <table class="app-info-table" align="center" cellspacing="20">
          <tbody>
            <tr>
              <td rowspan="4" width="150px"><img class="app-icon" src="app-icon.png" alt="Mountain" width="100%" /></td>
              <td>
                <div class="app_title">APP_NAME</div>
                <div class="app-version">BUNDLE_VERSION</div>
                <div><a class="install-button"
                    href="itms-services://?action=download-manifest&url=PLIST_URL">Install</a></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <hr align="center" width="90%">
      <br>
      <div class="mui--text-body1">Scan the following QR code to open this page in your phone</div>
      <div class="mui--text-body1">Tap on the QR code to begin installation</div>
      <br>

      <div>
        <img class="qr-center" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BUILD_URL" />
      </div>
    </div>

    <br>
  </div>
  </div>
  <footer>
    <p>Visit the <a target="_blank"
        href="https://docs.google.com/document/d/e/2PACX-1vSiYHmtwoZrjRRjPgXTe8g4OTIz230JZ9fTUJxHy9zkcJbn_x49O04_RAVYsBWIoUKDaZY7sjqIWMgY/pub">Troubleshooting</a>
      page if you need help installing this build</p>
  </footer>

</body>

</html>
