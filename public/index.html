<html>

<head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/4.3.0/dropzone.js"></script>
  <link rel="stylesheet" type="text/css" href="ui/dropzone.css" />
  <style>
    body {
      background: rgb(243, 244, 245);
      height: 100%;
      color: rgb(100, 108, 127);
      line-height: 1.4rem;
      font-family: Roboto, "Open Sans", sans-serif;
      font-size: 20px;
      font-weight: 300;
      text-rendering: optimizeLegibility;
      padding: 100px;
    }

    h1 {
      text-align: center;
    }

    .dropzone {
      background: white;
      border-radius: 5px;
      border: 2px dashed rgb(0, 135, 247);
      border-image: none;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>

</head>

<body>
  <h1>Upload iPA files</h1>
 <form ref='uploadForm' id='uploadForm' action='upload' method='post' class="dropzone"
    encType="multipart/form-data">
    <div class="dz-message needsclick">
      Drop .ipa files here or click to upload and get sharable build url<br>
    </div>
    </form>
    <div id="successful-upload">

    </div>
</body>
<script>
  Dropzone.autoDiscover = false;

  $(document).ready(function () {
    $("#uploadForm").dropzone({
      paramName: "file", // The name that will be used to transfer the file
      maxFilesize: 100, // MB
      acceptedFiles: ".ipa",
      init: function () {
        this.on("success", function (file, response) {
          console.log(response);
          $("body").html(response);
        })
      }
    });

  });

  $("#uploadForm").submit(function (e) {
    console.log('uploaded successfully');
    // e.preventDefault();
  });
</script>

</html>
